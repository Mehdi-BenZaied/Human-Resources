# HR Portal — Docker Compose
#
# Local:
#   docker compose up --build
#
# Jenkins:
#   FRONTEND_REF and BACKEND_REF point to the exact images built by the pipeline.
#   Host ports are configurable so the CI test can avoid port conflicts.

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-hr_portal}
      MYSQL_USER: ${DB_USER:-hr_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hr_password}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - hr_net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--password=${DB_ROOT_PASSWORD:-root}"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_REF:-hr-portal-backend:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql+pymysql://${DB_USER:-hr_user}:${DB_PASSWORD:-hr_password}@db:3306/${DB_NAME:-hr_portal}"
      SECRET_KEY: "${SECRET_KEY:-hr-portal-jwt-secret-change-in-production}"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      APP_ENV: "${APP_ENV:-production}"
      BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-12}"
      PORT: "4000"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:4200}"
    ports:
      - "${BACKEND_HOST_PORT:-4000}:4000"
    networks:
      - hr_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: "${API_BASE_URL:-http://localhost:4000}"
    image: ${FRONTEND_REF:-hr-portal-frontend:latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4200"
    ports:
      - "${FRONTEND_HOST_PORT:-4200}:4200"
    networks:
      - hr_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4200"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:
    driver: local

networks:
  hr_net:
    driver: bridge
