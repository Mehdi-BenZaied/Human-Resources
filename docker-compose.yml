version: '3.9'

services:

  # ── MySQL ─────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hr_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: hr_user
      MYSQL_PASSWORD: hr_password
      MYSQL_DATABASE: hr_portal
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'hr_user', '-phr_password']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://hr_user:hr_password@mysql:3306/hr_portal
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-in-production}
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      CORS_ORIGIN: http://localhost:4200
      BCRYPT_ROUNDS: 12
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend (Angular SSR) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 4200
    ports:
      - '4200:4200'

volumes:
  mysql_data:
